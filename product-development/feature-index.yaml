# Feature Index
#
# Master lookup for every feature your team is building. Maps each feature to
# all related artifacts so any teammate (or agent) can find what exists in one
# read instead of grepping the repo.
#
# Pattern from Hannah Stulberg's open-source Team OS repo:
# https://github.com/in-the-weeds-hannah-stulberg/team-os-example-repo
#
# Structure: product-area → sub-feature → all related artifacts
#
# Conventions
# - Keep this file authoritative. Whenever a feature ships, the launch gate
#   verifies its entry here.
# - Paths are relative to product-development/.
# - tickets references your tracker (Linear / Jira / Asana). Pick one format.
# - Omit keys that don't apply yet. Add them when artifacts exist.

# Replace these examples with your own product areas. Keep one or two as a
# template for new entries.

billing:
  credit-usage-dashboard:
    # The starter template ships every artifact for this feature so the
    # /feature-launch-gate gate passes on the example out of the box.
    prd: product/PRDs/billing/credit-usage-dashboard-prd.md
    eng-rfc: engineering/rfcs/billing/credit-usage-dashboard-rfc.md
    eng-plan: engineering/plans/billing/credit-usage-dashboard.md
    data-eng-rfc: data-engineering/rfcs/billing/credit-ledger-model-rfc.md
    data-eng-plan: data-engineering/plans/billing/credit-ledger-model.md
    # Figma references. Use file IDs (the abc123 in the URL), not display
    # names — file IDs survive renames. For specific frames, add a node-id:
    # https://figma.com/file/abc123/?node-id=42:128
    # Multiple Figma artifacts per feature is fine — separate by purpose.
    figma:
      flow: https://figma.com/file/your-figma-file
      prototype: https://figma.com/proto/your-figma-file
      components: https://figma.com/file/your-design-system-file/?node-id=42:128
    tickets:
      - YOURPROJ/123
      - YOURPROJ/124
    table-schemas:
      - analytics/schemas/billing/billing_events.md
    queries:
      - analytics/queries/billing/churn_by_segment.sql
    metrics:
      - analytics/metrics/billing/billing-metrics.md
    dashboards: analytics/dashboards/billing/credit-usage-dashboards.md
    experiments:
      - analytics/experiments/billing/low-balance-warning-2026-03-05-experiment-results.md
    investigations:
      - analytics/investigations/billing/2026-03-10-credit-depletion-churn-analysis.md
    bug-investigations:
      - engineering/bug-investigations/billing/bug-03-12-2026-credit-double-charge/investigation-plan.md
    decisions:
      - product/decisions/2026-02-14-usage-based-pricing.md

